<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0F" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Klaivo" />

  <!-- SEO -->
  <title>Klaivo — Think with AI. Study like never before.</title>
  <meta name="description" content="The AI study platform built exclusively for students. Understand deeper, write better, prepare smarter. Built for students everywhere." />
  <link rel="canonical" href="https://klaivo.app" />

  <!-- Open Graph (WhatsApp, Facebook, LinkedIn shares) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://klaivo.app" />
  <meta property="og:title" content="Klaivo — Think with AI. Study like never before." />
  <meta property="og:description" content="The AI for students who've outgrown the old way. Understand deeper, write better, prepare smarter." />
  <meta property="og:image" content="https://klaivo.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter/X card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Klaivo — Think with AI. Study like never before." />
  <meta name="twitter:description" content="The AI for students who've outgrown the old way." />
  <meta name="twitter:image" content="https://klaivo.app/og-image.png" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />

  <!-- Safe area CSS variables -->
  <style>
    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
